# Hyprland color palette — dark (purple/black, mirrors ~/.config/i3/colors-dark.conf)
general {
    col.active_border = rgba(a000ffaa) rgba(480073aa) 45deg
    col.inactive_border = rgba(595959aa)
}

group {
    col.border_active = rgba(a000ffaa)
    col.border_inactive = rgba(2a103dcc)
    col.border_locked_active = rgba(ff0000aa)
    col.border_locked_inactive = rgba(2d2d2dcc)

    groupbar {
        enabled = true
        height = 28
        font_size = 13
        gradients = false
        render_titles = true
        scrolling = true
        gaps_in = 0
        gaps_out = 0
        text_color_inactive = rgba(d0d0d0ff)
        text_color = rgba(ffffffff)
        col.active = rgba(a000ffff)
        col.inactive = rgba(2a103dff)
        col.locked_active = rgba(ff0000ff)
        col.locked_inactive = rgba(2d2d2dff)
    }
}
