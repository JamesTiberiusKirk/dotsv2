# Hyprland color palette — dark (purple/black, mirrors ~/.config/i3/colors-dark.conf)
general {
    col.active_border = rgba(a000ffaa) rgba(480073aa) 45deg
    col.inactive_border = rgba(595959aa)
}

group {
    col.border_active = rgba(a000ffaa)
    col.border_inactive = rgba(595959aa)
    col.border_locked_active = rgba(ff0000aa)
    col.border_locked_inactive = rgba(595959aa)

    groupbar {
        text_color = rgba(ffffffff)
        col.active = rgba(a000ffaa)
        col.inactive = rgba(595959aa)
        col.locked_active = rgba(ff0000aa)
        col.locked_inactive = rgba(595959aa)
    }
}
