# ============================================================================
# Hyprland — base configuration
# Sourced by hyprland.conf. Host-specific overrides live in hosts/$HOSTNAME.conf
# Migrated from i3 + Hyprland legacy config (April 2026).
# ============================================================================

###################
### MY PROGRAMS ###
###################
$terminal    = alacritty
$fileManager = thunar
$menu        = wofi --show drun

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

# Theme colors — symlink swapped by darkman / theme-apply
source = ~/.config/hypr/colors.conf

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global,         1, 10,   default
    animation = border,         1, 5.39, easeOutQuint
    animation = windows,        1, 4.79, easeOutQuint
    animation = windowsIn,      1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,     1, 1.49, linear,       popin 87%
    animation = fadeIn,         1, 1.73, almostLinear
    animation = fadeOut,        1, 1.46, almostLinear
    animation = fade,           1, 3.03, quick
    animation = layers,         1, 3.81, easeOutQuint
    animation = layersIn,       1, 4,    easeOutQuint, fade
    animation = layersOut,      1, 1.5,  linear,       fade
    animation = fadeLayersIn,   1, 1.79, almostLinear
    animation = fadeLayersOut,  1, 1.39, almostLinear
    animation = workspaces,     1, 1.94, almostLinear, fade
    animation = workspacesIn,   1, 1.21, almostLinear, fade
    animation = workspacesOut,  1, 1.94, almostLinear, fade
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

cursor {
    inactive_timeout = 3
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    repeat_delay = 300
    repeat_rate = 25

    touchpad {
        middle_button_emulation = 0
        tap-to-click = false
        scroll_factor = 0.2
        natural_scroll = true
        clickfinger_behavior = true
    }
}

###############
### DEVICES ###
###############
# Hyprland silently ignores device blocks for devices not present on the host,
# so all device tweaks live here regardless of which machine they apply to.

device {
    name = logitech-g203-prodigy-gaming-mouse
    sensitivity = -1
}

device {
    name = tpps/2-ibm-trackpoint
    sensitivity = -0.4
}

device {
    name = dell081c:00-044e:121f-touchpad
    natural_scroll = true
    scroll_factor = 0.2
    clickfinger_behavior = true
    tap-to-click = false
}

device {
    name = dell081c:00-044e:121f-mouse
    scroll_method = on_button_down
    scroll_button = 274
    scroll_factor = 0.3
}

device {
    name = apple-inc.-magic-trackpad
    sensitivity = 0.5
    natural_scroll = true
    clickfinger_behavior = true
    tap-to-click = false
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# --- Apps ---
bind = $mainMod,       RETURN, exec, $terminal
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       R,      exec, $menu
bind = $mainMod,       slash,  exec, ~/.scripts/hypr-doc-gen >/dev/null 2>&1; wofi --dmenu --prompt 'Hyprland bindings' --width 700 --height 600 < ~/.config/hypr/bindings.txt
bind = $mainMod SHIFT, Q,      killactive,
bind = $mainMod SHIFT, M,      exec, zenity --question --title="Exit Hyprland" --text="Really exit Hyprland?" && hyprctl dispatch exit
bind = $mainMod CTRL,  Q,      exec, systemctl suspend

# --- Layout switcher ---
bind = $mainMod CTRL,  L,      exec, ~/.scripts/layout-switcher.sh

# --- Window ---
bind = $mainMod,       V,      togglefloating,
bind = $mainMod,       F,      fullscreen, 0
bind = $mainMod SHIFT, F,      fullscreenstate, 2
bind = $mainMod,       P,      pseudo,

# --- Focus (vim) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- Move (vim + shift) ---
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# --- Resize submap (i3-style "resize mode") ---
bind = $mainMod SHIFT, R, submap, resize

submap = resize
binde = , h, resizeactive, -50 0
binde = , l, resizeactive, 50 0
binde = , k, resizeactive, 0 -50
binde = , j, resizeactive, 0 50
binde = SHIFT, h, resizeactive, -100 0
binde = SHIFT, l, resizeactive, 100 0
binde = SHIFT, k, resizeactive, 0 -100
binde = SHIFT, j, resizeactive, 0 100
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# --- Cross-monitor workspace ops ---
bind = $mainMod SHIFT, period, movecurrentworkspacetomonitor, r
bind = $mainMod SHIFT, comma,  movecurrentworkspacetomonitor, l

# Swap visible workspaces with adjacent monitor (i3-style submap):
# M+Tab → h/j/k/l to swap; Esc or Enter to bail.
bind = $mainMod, Tab, submap, swap

submap = swap
bind = , h,      exec,   ~/.config/hypr/scripts/swap-workspaces.sh left
bind = , h,      submap, reset
bind = , l,      exec,   ~/.config/hypr/scripts/swap-workspaces.sh right
bind = , l,      submap, reset
bind = , k,      exec,   ~/.config/hypr/scripts/swap-workspaces.sh up
bind = , k,      submap, reset
bind = , j,      exec,   ~/.config/hypr/scripts/swap-workspaces.sh down
bind = , j,      submap, reset
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# --- Tabs (groups) ---
bind = $mainMod,       W,            togglegroup,
bind = $mainMod,       bracketright, changegroupactive, f
bind = $mainMod,       bracketleft,  changegroupactive, b
bind = $mainMod SHIFT, G,            moveoutofgroup,
bind = $mainMod,       G,            lockactivegroup, toggle

# --- Mouse drag ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Reload hyprland config ---
bind = $mainMod SHIFT, C, exec, hyprctl reload && pkill -USR2 -x waybar

# --- Theme toggle ---
bind = $mainMod SHIFT, T, exec, ~/.scripts/theme-toggle

# --- Dunst ---
bind = $mainMod,       D, exec, dunstctl close
bind = $mainMod SHIFT, D, exec, dunstctl close-all

# --- Screenshot + OCR ---
bind = $mainMod SHIFT, S, exec, ~/.scripts/screenshot.sh
bind = $mainMod SHIFT, A, exec, ~/.scripts/extracttext.sh

# --- Night light ---
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/nightlight-toggle.sh

# --- Audio ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# --- Brightness (laptop hosts only — no-op on desktop) ---
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# --- Media ---
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

###################
### WINDOWRULES ###
###################
windowrule {
    name = alacritty-opacity
    match:class = ^(Alacritty)$

    opacity = 0.90 0.85
}

windowrule {
    name = firefox-picture-in-picture
    match:class = ^(firefox)$
    match:title = ^(Picture-in-Picture)$

    float = yes
    pin = yes
    size = 800 450
}

windowrule {
    name = blue-recorder-float
    match:class = ^(blue-recorder)$

    float = yes
}

windowrule {
    name = select-area-float
    match:title = ^(Select Area)$

    float = yes
}

windowrule {
    name = satty-float
    match:class = ^(com\.gabm\.satty|satty)$

    float = yes
}

windowrule {
    name = flameshot-float-pin
    match:class = ^(flameshot)$

    float = yes
    pin = yes
}

#################
### AUTOSTART ###
#################
exec-once = dunst
exec-once = ~/.scripts/launch-waybar
exec-once = pasystray
exec-once = blueman-applet
exec-once = owncloud
exec-once = hyprland-autoname-workspaces
exec-once = ~/.config/hypr/scripts/monitor-layout.sh
exec-once = swaybg -o '*' -i ~/Pictures/wallpapers/interior-of-a-barn.jpg -m fill
exec-once = ~/.config/hypr/scripts/workspace-layouts.sh
exec-once = cornd
