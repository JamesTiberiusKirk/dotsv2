# legion — AMD + NVIDIA hybrid laptop, Arch/systemd
#
# NVIDIA env vars (assumes proprietary driver >= 555). If you see invisible
# cursor or rendering glitches on an older driver, also add:
#   cursor { no_hardware_cursors = true }
# Reference: https://wiki.hyprland.org/Nvidia/

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,0
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
