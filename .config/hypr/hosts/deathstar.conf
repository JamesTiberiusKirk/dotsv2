# deathstar — nvidia desktop, Artix/runit
#
# Monitor layout replicated from autorandr profile `desktop-4`,
# translated to Hyprland connector names on deathstar:
# DP-1 = Acer VG271U
# DP-2 = HSG HP245HJB
# DP-3 = Philips 224E
# HDMI-A-1 = Dell P2225H

monitor = DP-2, 1920x1080@60, 2240x0,     1
monitor = DP-3, 1920x1080@60, 0x1080,     1
monitor = DP-1, 2560x1440@144, 1920x1080, 1
monitor = HDMI-A-1, preferred, 4480x1080, 1

# monitor-layout.sh re-applies the same layout dynamically after hotplug events.
# If pure-NVIDIA issues appear (cursor invisible, stutter, etc.), add env vars
# here. See hosts/legion.conf for the typical NVIDIA env block.
