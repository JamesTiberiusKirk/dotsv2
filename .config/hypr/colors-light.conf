# Hyprland color palette — light (gruvbox-inspired, mirrors ~/.config/i3/colors-light.conf)
general {
    col.active_border = rgba(b57614ee) rgba(d79921ee) 45deg
    col.inactive_border = rgba(d5c4a1aa)
}

group {
    col.border_active = rgba(b57614ee)
    col.border_inactive = rgba(d5c4a1aa)
    col.border_locked_active = rgba(cc241dee)
    col.border_locked_inactive = rgba(d5c4a1aa)

    groupbar {
        text_color = rgba(3c3836ff)
        col.active = rgba(b57614ee)
        col.inactive = rgba(ebdbb2aa)
        col.locked_active = rgba(cc241dee)
        col.locked_inactive = rgba(ebdbb2aa)
    }
}
