# Hyprland entry point. Universal config + per-host overlay.
#
# $HOSTNAME must be exported in the parent environment (set in ~/.profile or
# ~/bin/hypr). Hyprland evaluates this at parse time; if unset, the host file
# resolves to hosts/.conf which won't exist (silently skipped).

source = ~/.config/hypr/base.conf
source = ~/.config/hypr/hosts/$HOSTNAME.conf
