default_workspace: ws
session_presets:
    default:
        screens:
            - name: nvim
              layout: main-vertical
              panes:
                - command: nvim
                - {}
    dots:
        path: ~/
        screens:
            - name: profile
              panes:
                - command: nvim ~/.profile ~/.zshrc ~/.tmux.conf
            - name: hypr
              path: ~/.config/hypr
              panes:
                - command: nvim 
            - name: config
              path: ~/.config/
              layout: main-vertical
              panes:
                - command: nvim
            - name: nvim
              path: ~/.config/nvim
              layout: main-vertical
              panes:
                - command: nvim
            - name: workspacer
              path: ~/.config/workspacer
              layout: main-vertical
              panes:
                - command: nvim
    notes:
        path: ~/Documents/notes/
        screens:
            - name: nvim
              layout: main-vertical
              panes:
                - command: nvim
workspaces:
    at:
        active_projects_first: true
        enable_cache: true
        enable_git_info: true
        enable_remote_repos: true
        enable_usage_tracking: true
        github_backend: api
        is_org: true
        name: Atom
        org_github: AtomSites
        path: ~/atom/
        prefix: at
        recent_access_window: 50
        session_preset: default
    ff:
        active_projects_first: true
        enable_cache: true
        enable_git_info: true
        enable_remote_repos: true
        enable_usage_tracking: true
        github_backend: api
        is_org: true
        name: FyrmForge
        org_github: FyrmForge
        path: ~/FyrmForge/
        prefix: ff
        recent_access_window: 50
        session_preset: default
        projects:
            - name: framiworks.io
              sister_repos:
                - name: framiworks-docs
                  label: docs
    notes:
        name: Notes
        path: ~/Documents/notes/
        prefix: notes
        session_preset: notes
    ws:
        show_archived_repos: false
        active_projects_first: true
        enable_cache: true
        enable_git_info: true
        enable_remote_repos: true
        enable_usage_tracking: true
        github_backend: api
        name: Projects
        org_github: JamesTiberiusKirk
        path: ~/Projects/
        prefix: ws
        recent_access_window: 50
        session_preset: default
