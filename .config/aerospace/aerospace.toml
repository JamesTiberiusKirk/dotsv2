start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[gaps]
inner.horizontal = 5
inner.vertical   = 5
outer.left       = 5
outer.right      = 5
outer.top        = 5
outer.bottom     = 5

[mode.main.binding]
# --- Apps ---
cmd-enter   = 'exec-and-forget open -na WezTerm'
cmd-shift-q = 'close'
cmd-shift-c = 'reload-config'

# --- Layout ---
cmd-v = 'layout floating tiling'
cmd-f = 'fullscreen'

# --- Focus (vim) ---
cmd-h = 'focus left'
cmd-j = 'focus down'
cmd-k = 'focus up'
cmd-l = 'focus right'

# --- Move (vim + shift) ---
cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'

# --- Workspaces ---
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'
cmd-0 = 'workspace 10'

# --- Move to workspace ---
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'
cmd-shift-0 = 'move-node-to-workspace 10'

# --- Cross-monitor ---
cmd-shift-period = 'move-workspace-to-monitor next'
cmd-shift-comma  = 'move-workspace-to-monitor prev'

# --- Resize mode ---
cmd-shift-r = 'mode resize'

[mode.resize.binding]
h       = 'resize width -50'
l       = 'resize width +50'
k       = 'resize height -50'
j       = 'resize height +50'
shift-h = 'resize width -100'
shift-l = 'resize width +100'
shift-k = 'resize height -100'
shift-j = 'resize height +100'
esc     = 'mode main'
enter   = 'mode main'
