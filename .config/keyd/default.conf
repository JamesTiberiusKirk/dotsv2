# keyd config
# Devices:
#   048d:c100 — ITE Tech. Inc. ITE Device(8910) Keyboard (Lenovo Legion built-in)
#   0001:0001 — AT Translated Set 2 keyboard (Dell built-in / generic PS2)
#
# Mirrors part of the Corne ZMK layout:
#   - CapsLock → Ctrl (like the Corne's LCTRL in the caps position)
#   - LeftAlt (hold) → Nav layer: HJKL → arrow keys (vim-style, matches lower_layer)
#   - Use RightAlt for normal alt combos (alt+tab, etc.)

[ids]
# Match keyboard-class devices only. The generic 0001:0001 ID can otherwise
# collide with non-keyboard devices on some laptops.
k:048d:c100
k:0001:0001

[main]
capslock = layer(control)
leftalt = layer(nav)

[nav]
h = left
j = down
k = up
l = right
