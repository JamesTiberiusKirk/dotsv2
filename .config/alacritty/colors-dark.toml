# High-contrast dark (elflord-like)

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#000000"
foreground = "#E6E6E6"

[colors.cursor]
text = "#000000"
cursor = "#00FF5F"

[colors.selection]
text = "#FFFFFF"
background = "#2A2A2A"

[colors.normal]
black   = "#000000"
red     = "#CC0000"
green   = "#00CC66"
yellow  = "#D7AF00"
blue    = "#005FDD"
magenta = "#AF00AF"
cyan    = "#00AFAF"
white   = "#E6E6E6"

[colors.bright]
black   = "#4D4D4D"
red     = "#FF3333"
green   = "#33FF99"
yellow  = "#FFD700"
blue    = "#3399FF"
magenta = "#FF33FF"
cyan    = "#33FFFF"
white   = "#FFFFFF"
